name: shop_pos
description: Mobile POS for convenience stores
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1

  # Barcode scanner
  mobile_scanner: ^5.2.3

  # Receipt
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.0.3

  # Utils
  intl: ^0.19.0
  http: ^1.2.2
  uuid: ^4.5.1
  flutter_local_notifications: ^17.2.4

flutter:
  uses-material-design: true
